<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080808;
    --s1:       #0d0d0d;
    --s2:       #121212;
    --s3:       #181818;
    --border:   #1e1e1e;
    --border2:  #2c2c2c;
    --text:     #909090;
    --text-dim: #444;
    --text-hi:  #efefef;

    /* done / complete — cold steel white */
    --green:        #141a1f;
    --green-bdr:    #253040;
    --green-text:   #b8ccd8;
    --green-dim:    #4a6878;

    /* rest timer — hot amber */
    --amber:        #1e1408;
    --amber-bdr:    #58380a;
    --amber-text:   #c87818;

    --check:        #c8d8e0;
    --done-bg:      #0d1014;
    --done-bdr:     #1e2c38;

    /* accent */
    --accent:       #3a5068;
    --accent-hi:    #c87818;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(8,8,8,0.98);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 0;
    align-items: stretch;
  }

  .stat-block {
    padding: 0 28px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .stat-block .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--text-hi);
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .stat-block .lbl {
    font-size: 0.46rem;
    letter-spacing: 0.32em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .header-actions {
    display: flex;
    gap: 0;
    border-left: 1px solid var(--border);
    padding-left: 20px;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.22em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--border2); color: var(--text); }

  /* LAYOUT */
  .layout {
    min-height: calc(100vh - 65px);
  }

  /* MUSCLE GRID LANDING */
  .muscle-grid-view {
    padding: 48px 48px 48px;
    animation: rise 0.2s ease forwards;
  }

  .muscle-grid-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .muscle-grid-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 0.1em;
    color: var(--text-hi);
    line-height: 1;
  }

  .muscle-grid-sub {
    font-size: 0.5rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .muscle-grid-label {
    font-size: 0.52rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .muscle-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }

  .muscle-card {
    background: var(--s1);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    padding: 0;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.15s, border-color 0.15s;
    position: relative;
    overflow: hidden;
    min-height: 130px;
  }

  .muscle-card:hover {
    background: var(--s2);
    border-color: var(--border2);
    transform: scale(1.04);
    box-shadow: 0 0 32px rgba(0,0,0,0.6), 0 0 10px rgba(0,0,0,0.4);
    z-index: 2;
  }

  .muscle-card:hover .muscle-card-icon { opacity: 0.22; }
  .muscle-card:hover .muscle-card-index { color: var(--accent-hi); }

  /* ghost icon — right side watermark */
  .muscle-card-icon {
    position: absolute;
    right: -8px;
    bottom: -8px;
    width: 100px;
    height: 100px;
    object-fit: contain;
    opacity: 0.08;
    filter: grayscale(1);
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .muscle-card-inner {
    position: relative;
    z-index: 1;
    padding: 20px 22px 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
  }

  .muscle-card-index {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    margin-bottom: 8px;
    transition: color 0.15s;
  }

  .muscle-card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.06em;
    color: var(--text-hi);
    line-height: 0.9;
    margin-bottom: 16px;
  }

  .muscle-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .muscle-card-sets {
    font-size: 0.46rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .muscle-card-status {
    font-size: 0.46rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .muscle-card-status.done { color: var(--green-text); }
  .muscle-card-status.active { color: var(--accent-hi); }

  .muscle-card-pct.done { color: var(--green-text); }

  /* DETAIL VIEW */
  .detail-view {
    padding: 40px 48px;
    animation: rise 0.2s ease forwards;
  }

  .back-btn {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0 0 10px 0;
    font-family: 'DM Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
    transition: color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--border2); }
  .back-btn svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* keep .main for detail content */
  .main { padding: 0; }

  /* MUSCLE ICON (legacy sidebar — kept for compatibility but hidden) */
  .muscle-icon {
    width: 52px;
    height: 52px;
    object-fit: contain;
    flex-shrink: 0;
    opacity: 0.55;
    filter: grayscale(0.2);
    transition: opacity 0.15s, filter 0.15s;
  }

  .muscle-btn-info {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-width: 0;
  }

  .muscle-name {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* MAIN */
  .main { padding: 36px 40px; }

  .session-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .session-meta-label {
    font-size: 0.52rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .session-meta-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    letter-spacing: 0.1em;
  }

  .progress-track {
    height: 1px;
    background: var(--border);
    margin-bottom: 36px;
  }

  .progress-fill {
    height: 100%;
    background: var(--green-dim);
    transition: width 0.5s ease;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4.5rem;
    letter-spacing: 0.06em;
    line-height: 0.9;
    margin-bottom: 28px;
    color: var(--text-hi);
  }

  /* CARD */
  .exercise-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border2);
    margin-bottom: 2px;
    animation: rise 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  .exercise-card:nth-child(1) { animation-delay: 0.00s; }
  .exercise-card:nth-child(2) { animation-delay: 0.07s; }
  .exercise-card:nth-child(3) { animation-delay: 0.14s; }

  .exercise-card.all-done {
    background: var(--done-bg);
    border-color: var(--done-bdr);
    border-left-color: var(--green-dim);
  }

  .yt-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    margin-top: 14px;
    display: inline-flex;
  }
  .yt-btn:hover { border-color: #f00; color: #f00; }
  .yt-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

  /* CARD BODY */
  .card-body {
    display: grid;
    grid-template-columns: 1fr 300px;
  }

  .card-left {
    padding: 22px 24px;
    border-right: 1px solid var(--border);
  }

  .ex-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.65rem;
    letter-spacing: 0.06em;
    color: var(--text-hi);
    margin-bottom: 4px;
  }

  .exercise-card.all-done .ex-name { color: var(--green-text); }

  .muscles-line {
    font-size: 0.52rem;
    color: var(--text-dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .ex-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .tag {
    font-size: 0.48rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 9px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
  }

  .tag.hi { border-color: var(--border2); color: var(--text); }

  /* MUSCLE NAME WRAP (for freq pip) */
  .muscle-name-wrap { display: flex; align-items: center; gap: 7px; }

  /* FREQUENCY PIP */
  .freq-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .freq-pip.fresh { background: var(--green-dim); }
  .freq-pip.stale { background: var(--amber-text); opacity: 0.7; }
  .freq-pip.cold  { background: var(--border2); }

  /* PR / STREAK PILLS on card */
  .ex-stat-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .stat-pill {
    font-size: 0.46rem; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 3px 8px; border: 1px solid var(--border);
    color: var(--text-dim); background: transparent;
  }
  .stat-pill.amber { border-color: var(--amber-bdr); color: var(--amber-text); background: var(--amber); }
  .stat-pill.green { border-color: var(--green-bdr); color: var(--green-text); background: var(--green); }

  /* VOLUME CHART */
  .vol-chart-wrap { margin-bottom: 28px; }
  .vol-bar-area { display: flex; align-items: flex-end; gap: 5px; height: 72px; margin-bottom: 4px; }
  .vol-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .vol-bar { width: 100%; background: var(--s3); border: 1px solid var(--border); min-height: 2px; }
  .vol-bar.has-data { background: var(--green); border-color: var(--green-bdr); }
  .vol-bar.this-week { background: var(--green-dim); border-color: var(--green-text); }
  .vol-bar-val { font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.05em; min-height: 10px; }
  .vol-bar-lbl { font-size: 0.56rem; color: var(--text-dim); letter-spacing: 0.06em; text-align: center; white-space: nowrap; }

  /* EXERCISE STAT CARDS in history */
  .ex-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 8px; }
  .ex-stat-card { background: var(--s2); border: 1px solid var(--border); padding: 11px 13px; }
  .ex-stat-name { font-size: 0.72rem; letter-spacing: 0.1em; color: var(--text); text-transform: uppercase; margin-bottom: 8px; line-height: 1.4; }
  .ex-stat-nums { display: flex; gap: 14px; }
  .ex-stat-num .n { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--text-hi); line-height: 1; }
  .ex-stat-num .l { font-size: 0.58rem; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }

  .tempo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 18px;
  }

  .tempo-cell {
    background: var(--s2);
    border: 1px solid var(--border);
    padding: 10px 6px;
    text-align: center;
  }

  .tc-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--text);
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .tc-lbl {
    font-size: 0.48rem;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .cue-block {
    font-size: 0.66rem;
    line-height: 1.9;
    color: var(--text-dim);
    padding: 12px 14px;
    background: transparent;
    border-left: 2px solid var(--accent);
    font-style: italic;
    letter-spacing: 0.03em;
  }

  /* SETS */
  .card-right { padding: 22px 20px; }

  .sets-header {
    font-size: 0.52rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .set-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-left: 2px solid transparent;
    background: transparent;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }

  .set-row:hover { border-color: var(--border2); background: var(--s2); }

  .set-row.done {
    background: var(--green);
    border-color: var(--green-bdr);
    border-left-color: var(--green-dim);
  }

  .check-box {
    width: 14px;
    height: 14px;
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    flex-shrink: 0;
    transition: all 0.12s;
    color: transparent;
  }

  .set-row.done .check-box {
    background: var(--green-dim);
    border-color: var(--green-bdr);
    color: var(--check);
  }

  .set-info { flex: 1; }

  .set-num {
    font-size: 0.48rem;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .set-reps {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    color: var(--text);
    line-height: 1.1;
  }

  .set-row.done .set-reps { color: var(--green-text); }

  .set-tempo {
    font-size: 0.46rem;
    color: var(--text-dim);
    opacity: 0.5;
    margin-top: 1px;
  }

  /* REST — global timer next to section title */
  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 20px;
  }

  .global-rest-timer {
    display: none;
    align-items: center;
    gap: 14px;
    background: var(--s2);
    border: 1px solid var(--amber-bdr);
    padding: 10px 16px 10px 10px;
    flex-shrink: 0;
  }
  .global-rest-timer.active { display: flex; }

  .rest-ring-wrap { position: relative; flex-shrink: 0; width: 64px; height: 64px; }
  .rest-ring-wrap svg { transform: rotate(-90deg); }
  .rest-ring-bg  { fill: none; stroke: var(--border); stroke-width: 3; }
  .rest-ring-arc { fill: none; stroke: var(--amber-text); stroke-width: 3; stroke-linecap: round;
                   transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .rest-ring-arc.urgent { stroke: #c0392b; }
  .rest-ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .rest-ring-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem; color: var(--amber-text); letter-spacing: 0.06em; line-height: 1;
  }
  .rest-ring-num.urgent { color: #e74c3c; }
  .rest-ring-lbl {
    font-size: 0.38rem; letter-spacing: 0.18em; color: var(--text-dim);
    text-transform: uppercase; margin-top: 1px;
  }
  .rest-ring-go {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; color: var(--green-text); letter-spacing: 0.08em; line-height: 1;
  }
  .rest-info { }
  .rest-info-label {
    font-size: 0.42rem; letter-spacing: 0.25em; color: var(--amber-text);
    text-transform: uppercase; margin-bottom: 3px;
  }
  .rest-info-exname {
    font-size: 0.65rem; color: var(--text); letter-spacing: 0.05em; margin-bottom: 2px;
  }
  .rest-info-msg { font-size: 0.55rem; color: var(--text-dim); }

  /* FULL-SCREEN TIMER OVERLAY */
  .timer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,5,5,0.97);
    z-index: 800;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    cursor: pointer;
  }
  .timer-overlay.active { display: flex; }

  .timer-overlay-dismiss {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 0.44rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    opacity: 0.5;
  }

  .timer-overlay-label {
    font-size: 0.52rem;
    letter-spacing: 0.45em;
    color: var(--amber-text);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  .timer-overlay-exname {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 48px;
  }

  .timer-overlay-ring {
    position: relative;
    width: min(70vw, 70vh, 420px);
    height: min(70vw, 70vh, 420px);
    flex-shrink: 0;
  }
  .timer-overlay-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .tor-bg  { fill: none; stroke: var(--border); stroke-width: 4; }
  .tor-arc { fill: none; stroke: var(--amber-text); stroke-width: 4; stroke-linecap: round;
             transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .tor-arc.urgent { stroke: #e74c3c; }

  .timer-overlay-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .timer-overlay-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(22vw, 22vh, 130px);
    letter-spacing: 0.04em;
    color: var(--amber-text);
    line-height: 1;
  }
  .timer-overlay-num.urgent { color: #e74c3c; }
  .timer-overlay-go {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(22vw, 22vh, 130px);
    letter-spacing: 0.04em;
    color: var(--green-text);
    line-height: 1;
  }
  .timer-overlay-sub {
    font-size: 0.52rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 6px;
  }
  .timer-overlay-msg {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 40px;
    opacity: 0.6;
  }

  /* NOTES */
  .notes-wrap { margin-top: 10px; }

  .notes-lbl-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .notes-lbl {
    font-size: 0.52rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .notes-save-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.46rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .notes-save-btn:hover { border-color: var(--green-bdr); color: var(--green-text); }
  .notes-save-btn.saved { border-color: var(--green-bdr); color: var(--green-text); }

  .notes-input {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 11px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    line-height: 1.5;
    resize: vertical;
    min-height: 52px;
    outline: none;
    transition: border-color 0.2s;
  }

  .notes-input:focus { border-color: var(--border2); }
  .notes-input::placeholder { color: var(--text-dim); opacity: 0.4; }

  /* EMPTY */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 65vh;
    text-align: center;
  }

  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    opacity: 0.5;
    text-transform: uppercase;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--s3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 11px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    z-index: 600;
    transform: translateY(50px);
    opacity: 0;
    transition: all 0.25s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* ADD EXERCISE BUTTON */
  .add-exercise-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border2);
    color: var(--text-dim);
    padding: 16px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.18s;
  }
  .add-exercise-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--s1);
  }
  .add-exercise-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* CUSTOM EXERCISE DELETE BTN */
  .ex-delete-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .ex-delete-btn:hover { border-color: #c0392b; color: #c0392b; background: rgba(192,57,43,0.08); }
  .ex-name-row { display: flex; align-items: center; margin-bottom: 4px; }

  /* ADD EXERCISE MODAL */
  .ae-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .ae-overlay.open { display: flex; }

  .ae-modal {
    background: var(--s1);
    border: 1px solid var(--border2);
    width: 560px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    animation: rise 0.18s ease forwards;
  }

  .ae-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .ae-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.08em;
    color: var(--text-hi);
    line-height: 1;
  }

  .ae-subtitle {
    font-size: 0.46rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .ae-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .ae-close:hover { border-color: var(--border2); color: var(--text); }

  .ae-body { padding: 20px 24px; }

  .ae-field { margin-bottom: 16px; }

  .ae-label {
    display: block;
    font-size: 0.46rem;
    letter-spacing: 0.28em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .ae-input, .ae-textarea {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--border);
    color: var(--text-hi);
    padding: 9px 11px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    outline: none;
    transition: border-color 0.18s;
    letter-spacing: 0.03em;
  }
  .ae-input:focus, .ae-textarea:focus { border-color: var(--border2); }
  .ae-input::placeholder, .ae-textarea::placeholder { color: var(--text-dim); opacity: 0.4; }
  .ae-textarea { resize: vertical; min-height: 64px; line-height: 1.5; }

  .ae-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ae-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

  .ae-section-lbl {
    font-size: 0.44rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 4px;
  }

  .ae-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .ae-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 9px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ae-btn:hover { border-color: var(--border2); color: var(--text); }
  .ae-btn.primary {
    border-color: var(--accent);
    color: var(--green-text);
    background: var(--green);
  }
  .ae-btn.primary:hover { background: var(--done-bg); border-color: var(--green-bdr); }

  /* HISTORY PANEL */
  .history-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.22em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-right: 6px;
  }
  .history-btn:hover { border-color: var(--border2); color: var(--text); }

  .history-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: none;
    pointer-events: none;
  }
  .history-overlay.open { display: block; pointer-events: all; }

  .history-panel {
    background: var(--s1);
    border-left: 1px solid var(--border2);
    width: 520px;
    min-width: 320px;
    max-width: 90vw;
    height: 100vh;
    overflow-y: auto;
    padding: 32px 28px;
    animation: slideIn 0.2s ease;
    position: fixed;
    top: 0;
    right: 0;
    box-sizing: border-box;
    pointer-events: all;
  }

  .history-resize-handle {
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    cursor: ew-resize;
    z-index: 10;
    transition: background 0.15s;
  }
  .history-resize-handle:hover,
  .history-resize-handle.dragging { background: var(--accent); }

  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .history-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.12em;
    color: var(--text-hi);
  }

  .history-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .history-close:hover { border-color: var(--border2); color: var(--text); }

  .history-section-label {
    font-size: 0.68rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* streak dots — 12 weeks */
  .streak-grid {
    display: grid;
    grid-template-columns: 20px repeat(12, 28px);
    gap: 4px;
    margin-bottom: 32px;
  }

  .sg-dow-label {
    font-size: 0.62rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
  }

  .sg-cell {
    width: 28px;
    height: 28px;
    background: var(--s2);
    border: 1px solid var(--border);
    position: relative;
    cursor: default;
  }

  .sg-cell.worked { background: var(--green); border-color: var(--green-bdr); }
  .sg-cell.today  { border-color: var(--accent); }

  .sg-cell:hover .sg-tooltip {
    display: block;
  }

  .sg-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--s3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 0.58rem;
    padding: 5px 9px;
    white-space: nowrap;
    z-index: 10;
    letter-spacing: 0.05em;
    pointer-events: none;
  }

  /* month labels row */
  .month-labels {
    display: grid;
    grid-template-columns: 20px repeat(12, 28px);
    gap: 4px;
    margin-bottom: 6px;
  }
  .month-lbl {
    font-size: 0.62rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: center;
  }

  /* day log list */
  .day-log { margin-bottom: 8px; }

  .day-log-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .day-log-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem;
    letter-spacing: 0.06em;
    color: var(--text);
    width: 90px;
    flex-shrink: 0;
    line-height: 1.2;
  }

  .day-log-date .dldate-sub {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    font-weight: 300;
    margin-top: 1px;
  }

  .day-log-muscles {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding-top: 2px;
  }

  .muscle-chip {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--border2);
    background: var(--s2);
    color: var(--text);
  }

  .day-log-sets {
    margin-left: auto;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    white-space: nowrap;
    padding-top: 2px;
  }

  .history-empty {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    opacity: 0.5;
    padding: 20px 0;
  }

  @media (max-width: 900px) {
    .card-body { grid-template-columns: 1fr; }
    .card-left { border-right: none; border-bottom: 1px solid var(--border); }
    .muscle-grid { grid-template-columns: repeat(2, 1fr); }
    .muscle-grid-view { padding: 32px 28px; }
    .detail-view { padding: 32px 28px; }
  }

  @media (max-width: 680px) {
    .muscle-grid { grid-template-columns: 1fr 1fr; gap: 2px; }
    .muscle-grid-view { padding: 24px 16px; }
    .detail-view { padding: 24px 16px; }
    .muscle-card-name { font-size: 1.7rem; }
    .header { padding: 12px 16px; }
    .header-stats .stat-block:nth-child(n+2) { display: none; }
    .stat-block { padding: 0 14px; }
    .section-title { font-size: 3rem; }
  }

  /* REPS POPUP */
  .reps-popup {
    position: fixed; inset: 0; z-index: 700;
    display: none; align-items: center; justify-content: center;
  }
  .reps-popup.open { display: flex; }
  .reps-popup-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  }
  .reps-popup-inner {
    position: relative; z-index: 1;
    background: var(--s2); border: 1px solid var(--border2);
    padding: 28px 40px; display: flex; flex-direction: column;
    align-items: center; min-width: 180px;
    animation: rise 0.15s ease forwards;
  }
  .reps-popup-label {
    font-size: 0.44rem; letter-spacing: 0.32em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 6px;
  }
  .reps-popup-exname {
    font-size: 0.58rem; color: var(--text); letter-spacing: 0.06em;
    margin-bottom: 20px; text-align: center; max-width: 200px;
    line-height: 1.5;
  }
  .reps-stepper-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.4rem; line-height: 1;
    transition: all 0.12s; user-select: none;
  }
  .reps-stepper-btn:hover { border-color: var(--border2); color: var(--text); }
  .reps-stepper-btn:active { background: var(--s3); }
  .reps-stepper-val {
    font-family: 'Bebas Neue', sans-serif; font-size: 5rem;
    color: var(--text-hi); letter-spacing: 0.05em; line-height: 1;
    padding: 12px 0; min-width: 80px; text-align: center;
  }
  .reps-popup-range {
    font-size: 0.42rem; color: var(--text-dim); letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .reps-confirm-btn {
    background: var(--green); border: 1px solid var(--green-bdr);
    color: var(--green-text); padding: 11px 0;
    font-family: 'DM Mono', monospace; font-size: 0.52rem;
    letter-spacing: 0.28em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; width: 100%;
    margin-top: 14px;
  }
  .reps-confirm-btn:hover { background: var(--done-bg); border-color: var(--green-text); }


  /* SPARKLINES */
  .sparkline-list { margin-bottom: 28px; }
  .sparkline-row {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .sparkline-label {
    font-size: 0.5rem; letter-spacing: 0.22em; color: var(--text-dim);
    text-transform: uppercase; width: 76px; flex-shrink: 0;
  }
  .sparkline-svg { flex: 1; display: block; overflow: visible; }
  .sparkline-val {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
    color: var(--text-hi); letter-spacing: 0.06em;
    width: 48px; text-align: right; flex-shrink: 0;
  }
  .sparkline-val.zero { color: var(--text-dim); }
  .sparkline-week-axis {
    display: flex; align-items: center; gap: 14px;
    padding: 6px 0 2px;
  }
  .sparkline-axis-gap { width: 76px; flex-shrink: 0; }
  .sparkline-axis-svg { flex: 1; display: block; }
  .sparkline-axis-end { width: 48px; flex-shrink: 0; }
</style>
</head>
<body>

<header class="header">
  <div class="header-wordmark">Will is Everything</div>
  <div class="header-stats">
    <div class="stat-block">
      <div class="val" id="hdr-sets">0</div>
      <div class="lbl">Sets Today</div>
    </div>
    <div class="stat-block">
      <div class="val" id="hdr-streak">0</div>
      <div class="lbl">Day Streak</div>
    </div>
    <div class="stat-block">
      <div class="val" id="hdr-sessions">0</div>
      <div class="lbl">Total Sessions</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="history-btn" onclick="openHistory()">History</button>
    <button class="reset-btn" onclick="confirmReset()">Reset Today</button>
  </div>
</header>

<!-- HISTORY PANEL -->
<div class="history-overlay" id="historyOverlay">
  <div class="history-panel" id="historyPanel">
    <div class="history-resize-handle" id="historyResizeHandle"></div>
    <div class="history-header">
      <div class="history-title">Training History</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="reset-btn" onclick="exportData()">Export</button>
        <label class="reset-btn" style="cursor:pointer;">Import<input type="file" accept=".json" onchange="importData(event)" style="display:none;"></label>
        <button class="history-close" onclick="closeHistory()">&#10005;</button>
      </div>
    </div>
    <div id="history-content"></div>
  </div>
</div>

<div class="layout">
  <div id="main-content">
    <!-- landing grid injected by buildLanding() -->
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FULL-SCREEN REST TIMER OVERLAY -->
<div class="timer-overlay" id="timerOverlay" onclick="dismissTimerOverlay()">
  <div class="timer-overlay-dismiss">Tap anywhere to dismiss</div>
  <div class="timer-overlay-label">Rest Timer</div>
  <div class="timer-overlay-exname" id="tor-exname">—</div>
  <div class="timer-overlay-ring">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle class="tor-bg" cx="100" cy="100" r="90"/>
      <circle class="tor-arc" id="tor-arc" cx="100" cy="100" r="90"
        stroke-dasharray="565.5" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-overlay-center">
      <div class="timer-overlay-num" id="tor-num">0:00</div>
      <div class="timer-overlay-sub" id="tor-sub">seconds remaining</div>
    </div>
  </div>
  <div class="timer-overlay-msg" id="tor-msg">Breathe. Next set coming.</div>
</div>

<!-- REPS POPUP -->
<div id="repsPopup" class="reps-popup">
  <div class="reps-popup-backdrop" onclick="closeRepsPopup()"></div>
  <div class="reps-popup-inner">
    <div class="reps-popup-label">Reps Completed</div>
    <div class="reps-popup-exname" id="repsPopupExname"></div>
    <div class="reps-popup-range" id="repsPopupRange"></div>
    <button class="reps-stepper-btn" onclick="adjustReps(1)">&#8963;</button>
    <div class="reps-stepper-val" id="repsStepperVal">8</div>
    <button class="reps-stepper-btn" onclick="adjustReps(-1)">&#8964;</button>
    <button class="reps-confirm-btn" onclick="confirmReps()">Log Set</button>
  </div>
</div>

<!-- ADD EXERCISE MODAL -->
<div class="ae-overlay" id="aeOverlay">
  <div class="ae-modal" id="aeModal">
    <div class="ae-header">
      <div>
        <div class="ae-title">Add Exercise</div>
        <div class="ae-subtitle" id="ae-muscle-label">to muscle group</div>
      </div>
      <button class="ae-close" onclick="closeAddExModal()">✕</button>
    </div>
    <div class="ae-body">
      <div class="ae-field">
        <label class="ae-label">Exercise Name *</label>
        <input class="ae-input" id="ae-name" placeholder="e.g. Diamond Push Ups" />
      </div>
      <div class="ae-field">
        <label class="ae-label">Muscles Worked</label>
        <input class="ae-input" id="ae-muscles" placeholder="e.g. Triceps / Pectoralis / Anterior Deltoid" />
      </div>
      <div class="ae-row ae-field">
        <div>
          <label class="ae-label">Sets *</label>
          <input class="ae-input" id="ae-sets" type="number" min="1" max="20" placeholder="3" />
        </div>
        <div>
          <label class="ae-label">Reps</label>
          <input class="ae-input" id="ae-reps" placeholder="8-10" />
        </div>
      </div>
      <div class="ae-field">
        <label class="ae-label">Rest (seconds)</label>
        <input class="ae-input" id="ae-rest" type="number" min="10" max="600" placeholder="90" />
      </div>
      <div class="ae-field">
        <div class="ae-section-lbl">Tempo (seconds) — Eccentric · Bottom Hold · Concentric · Top Hold</div>
        <div class="ae-row-4">
          <input class="ae-input" id="ae-t0" type="number" min="0" max="30" placeholder="3" />
          <input class="ae-input" id="ae-t1" type="number" min="0" max="30" placeholder="1" />
          <input class="ae-input" id="ae-t2" type="number" min="0" max="30" placeholder="2" />
          <input class="ae-input" id="ae-t3" type="number" min="0" max="30" placeholder="1" />
        </div>
      </div>
      <div class="ae-field">
        <label class="ae-label">Coaching Cues</label>
        <textarea class="ae-textarea" id="ae-cues" placeholder="Describe form, focus points, and feel for each rep..."></textarea>
      </div>
    </div>

      <button class="ae-btn" onclick="closeAddExModal()">Cancel</button>
      <button class="ae-btn primary" onclick="saveNewExercise()">Save Exercise</button>
    </div>
  </div>
</div>

const MUSCLE_ICONS = {

  back:      'back.png',

  deltoid:   'deltoid.png',

};

function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayKey() { return 'wd_' + localDateStr(new Date()); }
function loadProgress() { try { return JSON.parse(localStorage.getItem(todayKey())||'{}'); } catch { return {}; } }
function saveProgress(p) {
  localStorage.setItem(todayKey(), JSON.stringify(p));
  // If no sets remain completed today, remove today from history and muscle log
  const totalDone = Object.values(p).reduce((sum, ep) => sum + Object.values(ep).filter(Boolean).length, 0);
  if (totalDone === 0) {
    const today = localDateStr(new Date());
    const h = loadHistory();
    delete h[today];
    localStorage.setItem('wd_hist', JSON.stringify(h));
    const mg = JSON.parse(localStorage.getItem('wd_muscles') || '{}');
    delete mg[today];
    localStorage.setItem('wd_muscles', JSON.stringify(mg));
  }
  updateHeader();
  if(activeKey) renderMain(activeKey);
}
function loadNotes(dateStr) {
  try {
    const raw = JSON.parse(localStorage.getItem('wd_notes') || '{}');
    const d = dateStr || localDateStr(new Date());
    // Migrate old flat format (values are strings) to date-keyed format
    const firstVal = Object.values(raw)[0];
    if (firstVal !== undefined && typeof firstVal === 'string') {
      const migrated = { [localDateStr(new Date())]: raw };
      localStorage.setItem('wd_notes', JSON.stringify(migrated));
      return migrated[d] || {};
    }
    return raw[d] || {};
  } catch { return {}; }
}
function saveNote(id, txt) {
  try {
    const raw = JSON.parse(localStorage.getItem('wd_notes') || '{}');
    const d = localDateStr(new Date());
    const firstVal = Object.values(raw)[0];
    const all = (firstVal !== undefined && typeof firstVal === 'string') ? { [d]: raw } : raw;
    if (!all[d]) all[d] = {};
    if (txt.trim()) all[d][id] = txt; else delete all[d][id];
    localStorage.setItem('wd_notes', JSON.stringify(all));
  } catch {}
}
function saveExerciseNote(id) {
  const el = document.getElementById('note-' + id);
  if (!el) return;
  saveNote(id, el.value);
  const btn = document.getElementById('notebtn-' + id);
  if (btn) {
    btn.textContent = 'Saved \u2713';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('saved'); }, 1500);
  }
}
function loadHistory() { try { return JSON.parse(localStorage.getItem('wd_hist')||'{}'); } catch { return {}; } }
function stampSession(muscle) {
  const h=loadHistory(), d=localDateStr(new Date());
  h[d]=(h[d]||0)+1;
  localStorage.setItem('wd_hist',JSON.stringify(h));
  // record muscle groups per day
  const mg = JSON.parse(localStorage.getItem('wd_muscles')||'{}');
  if(!mg[d]) mg[d]=[];
  if(muscle && !mg[d].includes(muscle)) mg[d].push(muscle);
  localStorage.setItem('wd_muscles', JSON.stringify(mg));
  updateHeader();
}

function updateHeader() {
  const p=loadProgress(); let total=0;
  Object.values(p).forEach(e=>Object.values(e).forEach(v=>{if(v)total++;}));
  document.getElementById('hdr-sets').textContent=total;
  const h=loadHistory(), today=new Date(); let streak=0;
  for(let i=0;i<365;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    if(h[localDateStr(d)]) streak++; else if(i>0) break;
  }
  document.getElementById('hdr-streak').textContent=streak;
  document.getElementById('hdr-sessions').textContent=Object.keys(h).length;
}

let activeKey=null;

function buildLanding() {
  activeKey = null;
  const p = loadProgress();
  const muscles = JSON.parse(localStorage.getItem('wd_muscles')||'{}');
  const today = new Date();

  const cards = Object.entries(DATA).map(([k, g], idx) => {
    const total = g.exercises.reduce((s,e) => s+e.sets, 0);
    let done = 0; g.exercises.forEach(e => { if(p[e.id]) done += Object.values(p[e.id]).filter(Boolean).length; });
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    const allDone = done >= total && total > 0;
    const started = done > 0 && !allDone;

    // frequency pip
    let lastDays = null;
    for(let i=0; i<60; i++){
      const d = new Date(today); d.setDate(d.getDate()-i);
      const ds = localDateStr(d);
      if(muscles[ds] && muscles[ds].includes(k)){ lastDays=i; break; }
    }
    let pipClass = 'cold';
    if(lastDays !== null){ pipClass = lastDays<=3?'fresh':lastDays<=7?'stale':'cold'; }
    const pipTitle = lastDays===null?'Never trained':lastDays===0?'Today':lastDays===1?'Yesterday':`${lastDays}d ago`;
    const iconSrc = MUSCLE_ICONS[k] || '';
    const indexStr = String(idx+1).padStart(2,'0');
    const statusText = allDone ? 'COMPLETE' : started ? `${pct}% &mdash; IN PROGRESS` : 'READY';
    const statusCls = allDone ? 'done' : started ? 'active' : '';

    return `<div class="muscle-card" onclick="selectMuscle('${k}')">
      ${iconSrc ? `<img class="muscle-card-icon" src="${iconSrc}" alt="${g.label}">` : ''}
      <div class="muscle-card-inner">
        <div class="muscle-card-index">${indexStr} &nbsp;·&nbsp; <span class="freq-pip ${pipClass}" style="display:inline-block;vertical-align:middle;" title="${pipTitle}"></span></div>
        <div class="muscle-card-name">${g.label}</div>
        <div class="muscle-card-footer">
          <span class="muscle-card-sets">${total} SETS</span>
          <span class="muscle-card-status ${statusCls}">${statusText}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="muscle-grid-view">
      <div class="muscle-grid-header">
        <div class="muscle-grid-title">Select Target</div>
        <div class="muscle-grid-sub">Choose muscle group to begin session</div>
      </div>
      <div class="muscle-grid">${cards}</div>
    </div>`;
}

function selectMuscle(key) {
  activeKey = key;
  renderMain(key);
}

function renderMain(key) {
  const g = DATA[key], p = loadProgress(), notes = loadNotes();

              <circle class="rest-ring-bg" cx="32" cy="32" r="27"/>

                stroke-dasharray="169.6" stroke-dashoffset="0"/>
            </svg>
            <div class="rest-ring-center">
              <span class="rest-ring-num" id="rcd-global">—</span>
              <span class="rest-ring-lbl">rest</span>
            </div>
          </div>
          <div class="rest-info">
            <div class="rest-info-label">Resting</div>
            <div class="rest-info-exname" id="rmsg-exname">—</div>
            <div class="rest-info-msg" id="rmsg-global">Breathe. Next set coming.</div>
          </div>
        </div>
      </div>
      <div class="session-meta">
        <span class="session-meta-label">Session Progress</span>
        <span class="session-meta-pct">${done} / ${total} sets &mdash; ${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div id="exercise-list">
        ${g.exercises.map((ex,i) => renderCard(ex,p,notes,i)).join('')}

      <button class="add-exercise-btn" onclick="openAddExModal('${key}')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
        Add Exercise
      </button>
    </div>`;
}

function renderCard(ex, p, notes, idx) {
  const ep=p[ex.id]||{};
  const done=Object.values(ep).filter(Boolean).length;
  const allDone=done===ex.sets;
  const note=notes[ex.id]||'';

  const streak=getExStreak(ex.id, ex.sets);
  const totalSessions=getTotalExSessions(ex.id, ex.sets);
  const statPills=(streak>0||totalSessions>0)?`<div class="ex-stat-row">
    ${streak>0?`<span class="stat-pill ${streak>=5?'amber':'green'}">🔥 ${streak} in a row</span>`:''}
    ${totalSessions>0?`<span class="stat-pill">✓ ${totalSessions} session${totalSessions!==1?'s':''} complete</span>`:''}
  </div>`:'';

  const tempoHtml=ex.tempo.map((t,i)=>`
    <div class="tempo-cell">
      <div class="tc-num">${t}s</div>
      <div class="tc-lbl">${ex.tempoLabels[i]}</div>
    </div>`).join('');

  const setsHtml=Array.from({length:ex.sets},(_,i)=>{
    const val=ep[`s${i}`];
    const isDone=!!val;
    const loggedReps=isDone?getRepsValue(val,ex.id):null;
    return `<div class="set-row ${isDone?'done':''}" onclick="toggleSet('${ex.id}',${i})">
      <div class="check-box">${isDone?'&#10003;':''}</div>
      <div class="set-info">
        <div class="set-num">Set ${i+1} of ${ex.sets}</div>
        <div class="set-reps">${isDone?`${loggedReps} reps`:ex.reps+' reps'}</div>
        <div class="set-tempo">Tempo ${ex.tempo.join('-')}</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="exercise-card ${allDone?'all-done':''}" id="card-${ex.id}" style="animation-delay:${idx*0.08}s">
    <div class="card-body">
      <div class="card-left">
        <div class="ex-name-row">
          <div class="ex-name" style="flex:1">${ex.name}${allDone?' &mdash; Complete':''}</div>
          ${ex.isCustom ? `<button class="ex-delete-btn" onclick="event.stopPropagation();deleteCustomExercise('${activeKey}','${ex.id}')" title="Remove exercise">✕</button>` : ''}
        </div>
        <div class="muscles-line">${ex.muscles}</div>
        ${statPills}
        <div class="ex-tags">
          <span class="tag">${ex.sets} Sets</span>
          <span class="tag">${ex.reps} Reps</span>
          <span class="tag hi">Tempo ${ex.tempo.join('-')}</span>
          <span class="tag">Rest ${ex.rest}s</span>
          <span class="tag">${done}/${ex.sets} done</span>
        </div>
        <div class="tempo-grid">${tempoHtml}</div>
        <div class="cue-block">${ex.cues}</div>
        <a class="yt-btn" href="https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name+' exercise')}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M23.5 6.2s-.2-1.6-1-2.3c-.9-1-1.9-1-2.4-1C17.2 2.7 12 2.7 12 2.7s-5.2 0-8.1.2c-.5.1-1.5.1-2.4 1-.7.7-1 2.3-1 2.3S.3 8 .3 9.8v1.7c0 1.7.2 3.5.2 3.5s.2 1.6 1 2.3c.9 1 2.1.9 2.6 1C5.8 18.5 12 18.5 12 18.5s5.2 0 8.1-.3c.5-.1 1.5-.1 2.4-1 .7-.7 1-2.3 1-2.3s.2-1.7.2-3.5V9.8c0-1.7-.2-3.6-.2-3.6zM9.7 14.3V8.1l6.6 3.1-6.6 3.1z"/></svg>
          Watch on YouTube
        </a>
      </div>
      <div class="card-right">
        <div class="sets-header">Sets</div>
        ${setsHtml}
        <div class="notes-wrap">
          <div class="notes-lbl-row">
            <div class="notes-lbl">Session Notes</div>
            <button class="notes-save-btn" id="notebtn-${ex.id}" onclick="saveExerciseNote('${ex.id}')">Save</button>
          </div>
          <textarea class="notes-input" id="note-${ex.id}" placeholder="How did this feel?">${note}</textarea>
        </div>
      </div>
    </div>
  </div>`;
}

const restTimers={};

// ── REPS HELPERS ─────────────────────────────────────────
function parseMinReps(repsStr) {
  const m = String(repsStr).match(/(\d+)/);
  return m ? parseInt(m[1]) : 1;
}
function parseMaxReps(repsStr) {
  const nums = String(repsStr).match(/\d+/g);
  return nums && nums.length >= 2 ? parseInt(nums[nums.length - 1]) : parseMinReps(repsStr);
}
function getExerciseByID(exId) {
  for (const g of Object.values(DATA)) {
    for (const ex of g.exercises) { if (ex.id === exId) return ex; }
  }
  return null;
}
function getRepsValue(val, exId) {
  if (!val) return 0;
  if (typeof val === 'number') return val;
  if (val === true) { const ex = getExerciseByID(exId); return ex ? parseMinReps(ex.reps) : 1; }
  return 0;
}

// ── REPS POPUP ───────────────────────────────────────────
let _repsPopupState = null;

function showRepsPopup(exId, setIdx) {
  const ex = getExerciseByID(exId);
  const minR = ex ? parseMinReps(ex.reps) : 1;
  const maxR = ex ? parseMaxReps(ex.reps) * 2 : 40;
  _repsPopupState = { exId, setIdx, current: minR, min: 1, max: maxR };
  document.getElementById('repsStepperVal').textContent = minR;
  document.getElementById('repsPopupRange').textContent = `Target: ${ex ? ex.reps : ''} reps`;
  document.getElementById('repsPopupExname').textContent = ex ? `${ex.name} · Set ${setIdx + 1}` : '';
  document.getElementById('repsPopup').classList.add('open');
}

function adjustReps(delta) {
  if (!_repsPopupState) return;
  _repsPopupState.current = Math.max(_repsPopupState.min, Math.min(_repsPopupState.max, _repsPopupState.current + delta));
  document.getElementById('repsStepperVal').textContent = _repsPopupState.current;
}

function closeRepsPopup() {
  document.getElementById('repsPopup').classList.remove('open');
  _repsPopupState = null;
}

function confirmReps() {
  if (!_repsPopupState) return;
  const { exId, setIdx, current } = _repsPopupState;
  closeRepsPopup();
  const p = loadProgress();
  if (!p[exId]) p[exId] = {};
  p[exId][`s${setIdx}`] = current;
  let restSec = 90, muscleKey = null, exSets = 4;
  Object.entries(DATA).forEach(([mk, g]) => g.exercises.forEach(e => {
    if (e.id === exId) { restSec = e.rest; muscleKey = mk; exSets = e.sets; }
  }));
  saveProgress(p);
  const doneSets = Object.values(p[exId]).filter(Boolean).length;
  recordExSets(exId, doneSets);
  stampSession(muscleKey);
  if (doneSets === exSets) {
    const streak = getExStreak(exId, exSets);
    if (streak >= 3) showToast(`🔥 ${streak} sessions in a row!`);
    else showToast(`Exercise complete! Rest ${restSec}s.`);
  } else {
    showToast(`Set ${setIdx + 1} done — ${current} reps. Rest ${restSec}s.`);
  }
  if (activeKey) renderMain(activeKey);
  startRest(exId, restSec);
}

function toggleSet(exId, i) {
  const p = loadProgress();
  if (!p[exId]) p[exId] = {};
  const k = `s${i}`;
  if (p[exId][k]) {
    delete p[exId][k];
    saveProgress(p);
    stopRest();
    if (activeKey) renderMain(activeKey);
  } else {
    showRepsPopup(exId, i);
  }
}


function startRest(id, sec) {
  let exName = '';
  Object.values(DATA).forEach(g=>g.exercises.forEach(e=>{ if(e.id===id) exName=e.name; }));

  // clear any running timer
  if (restTimers._active) { clearInterval(restTimers._active); delete restTimers._active; }

  const CIRC = 2 * Math.PI * 90; // r=90 → 565.5
  let rem = sec, warned = false;

  // show overlay
  const overlay = document.getElementById('timerOverlay');
  const numEl   = document.getElementById('tor-num');
  const arcEl   = document.getElementById('tor-arc');
  const msgEl   = document.getElementById('tor-msg');
  const exEl    = document.getElementById('tor-exname');
  const subEl   = document.getElementById('tor-sub');

  // Clean up any leftover state from a previously completed timer
  const torCenter = document.querySelector('.timer-overlay-center');
  if (torCenter) torCenter.querySelectorAll('.timer-overlay-go').forEach(el => el.remove());

  if (exEl)  exEl.textContent = exName;
  if (numEl) { numEl.style.display = ''; numEl.textContent = fmt(rem); numEl.className = 'timer-overlay-num'; }
  if (subEl) { subEl.style.display = ''; subEl.textContent = 'seconds remaining'; }
  if (arcEl) { arcEl.style.strokeDashoffset = 0; arcEl.className = 'tor-arc'; }
  if (msgEl) msgEl.textContent = 'Breathe. Next set coming.';
  if (overlay) overlay.classList.add('active');

  // also keep the small inline timer visible (hidden by overlay but kept in DOM)
  const wrap = document.getElementById('global-rest-timer');
  if (wrap) wrap.classList.add('active');
  const inlineNum = document.getElementById('rcd-global');
  const inlineArc = document.getElementById('rarc-global');
  const inlineEx  = document.getElementById('rmsg-exname');
  if (inlineEx)  inlineEx.textContent = exName;
  if (inlineNum) { inlineNum.textContent = fmt(rem); inlineNum.className = 'rest-ring-num'; }
  if (inlineArc) { inlineArc.style.strokeDashoffset = 0; inlineArc.className = 'rest-ring-arc'; }

  restTimers._active = setInterval(() => {
    rem--;
    const n = document.getElementById('tor-num');
    const a = document.getElementById('tor-arc');
    const m = document.getElementById('tor-msg');
    const s = document.getElementById('tor-sub');
    const in_n = document.getElementById('rcd-global');
    const in_a = document.getElementById('rarc-global');
    if (!n) { clearInterval(restTimers._active); return; }

    if (rem <= 0) {
      clearInterval(restTimers._active); delete restTimers._active;
      n.style.display = 'none';
      if (s) s.style.display = 'none';
      const center = n.closest('.timer-overlay-center');
      if (center) {
        const go = document.createElement('div');
        go.className = 'timer-overlay-go'; go.textContent = 'GO';
        center.appendChild(go);
      }
      if (a) { a.style.strokeDashoffset = CIRC; a.classList.add('urgent'); }
      if (m) m.textContent = 'Start your next set!';
      // update inline too
      if (in_n) { in_n.closest('.rest-ring-center').innerHTML = '<span class="rest-ring-go">Go</span>'; }
      if (in_a) { in_a.style.strokeDashoffset = 2*Math.PI*27; in_a.classList.add('urgent'); }
      playRestDone();
      showToast('Rest complete. Next set.');
      setTimeout(() => {
        const ov = document.getElementById('timerOverlay');
        if (ov) ov.classList.remove('active');
        const b = document.getElementById('global-rest-timer');
        if (b) b.classList.remove('active');
      }, 2500);
    } else {
      if (rem <= 3 && !warned) { warned = true; playWarningBeep(); }
      n.textContent = fmt(rem);
      const urgent = rem <= 5;
      n.className = 'timer-overlay-num' + (urgent ? ' urgent' : '');
      if (a) {
        a.style.strokeDashoffset = CIRC * (1 - rem / sec);
        a.className = 'tor-arc' + (urgent ? ' urgent' : '');
      }
      const msgs = ['Breathe. Next set coming.', 'Stay loose. Keep breathing.', 'Almost ready. Stay focused.'];
      if (m) m.textContent = msgs[Math.min(Math.floor((1 - rem/sec) * msgs.length), msgs.length-1)];
      // sync inline
      if (in_n) { in_n.textContent = fmt(rem); in_n.className = 'rest-ring-num' + (urgent ? ' urgent' : ''); }
      if (in_a) { in_a.style.strokeDashoffset = 2*Math.PI*27*(1-rem/sec); }
    }
  }, 1000);
}

function exportData() {

    const key = localStorage.key(i);
    if (key.startsWith('wd_')) {
      try { data[key] = JSON.parse(localStorage.getItem(key)); }
      catch { data[key] = localStorage.getItem(key); }
    }
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workout_backup_${localDateStr(new Date())}.json`;

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (typeof data !== 'object' || data === null) throw new Error();
      const keys = Object.keys(data).filter(k => k.startsWith('wd_'));
      if (keys.length === 0) { showToast('No valid data found in file.'); return; }
      if (!confirm(`Import ${keys.length} records? This will merge with existing data.`)) return;
      keys.forEach(k => localStorage.setItem(k, JSON.stringify(data[k])));
      mergeCustomExercises();
      updateHeader();
      activeKey ? renderMain(activeKey) : buildLanding();
      showToast(`Imported ${keys.length} records successfully.`);
    } catch {
      showToast('Invalid backup file.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function renderHistory() {
  const hist = loadHistory();
  const muscles = JSON.parse(localStorage.getItem('wd_muscles')||'{}');
  const today = new Date();
  const todayStr = localDateStr(today);

  // ── 12-week contribution grid ──────────────────────────
  // Build a grid: 7 rows (Mon–Sun) x 12 cols (weeks), ending today
  const DOW_LABELS = ['M','T','W','T','F','S','S'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Find the Sunday of the week containing today, then go back 12 weeks
  const dayOfWeek = (today.getDay() + 6) % 7; // Mon=0, Sun=6
  // Start of 12-week window: Monday 12 weeks ago
  const gridStart = new Date(today);
  gridStart.setDate(gridStart.getDate() - dayOfWeek - 7*11);

  // Build 12 columns × 7 rows
  let weeks = [];
  for(let w=0; w<12; w++) {
    let week = [];
    for(let d=0; d<7; d++) {
      const dt = new Date(gridStart);
      dt.setDate(gridStart.getDate() + w*7 + d);
      week.push(dt);
    }
    weeks.push(week);
  }

  // Month labels (show month name at first week of that month in grid)
  const monthLabels = weeks.map(week => {
    const firstDay = week[0];
    // Show month if the 1st of the month falls within this week
    const hasFirst = week.some(d => d.getDate() === 1);
    if(hasFirst) {
      const monthDay = week.find(d => d.getDate() === 1);
      return MONTHS[monthDay.getMonth()];
    }
    return '';
  });

  const monthRow = `<div class="month-labels">
    <div></div>
    ${monthLabels.map(m=>`<div class="month-lbl">${m}</div>`).join('')}
  </div>`;

  const gridRows = DOW_LABELS.map((lbl, di) => {
    const cells = weeks.map(week => {
      const dt = week[di];
      const ds = localDateStr(dt);
      const worked = !!hist[ds];
      const isToday = ds === todayStr;
      const isFuture = dt > today;
      if(isFuture) return `<div class="sg-cell" style="opacity:0.2"></div>`;
      const mgs = muscles[ds] ? muscles[ds].map(m=>DATA[m]?DATA[m].label:m).join(', ') : '';
      const tooltip = worked
        ? `${ds}${mgs ? ' — '+mgs : ''}`
        : ds;
      return `<div class="sg-cell ${worked?'worked':''} ${isToday?'today':''}">
        <div class="sg-tooltip">${tooltip}</div>
      </div>`;
    }).join('');
    return `<div class="sg-dow-label">${lbl}</div>${cells}`;
  }).join('');

  const grid = `${monthRow}<div class="streak-grid">${gridRows}</div>`;

  // ── Day-by-day log (last 30 days with activity) ────────
  const logDays = [];
  for(let i=0; i<120; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const ds = localDateStr(d);
    if(hist[ds]) logDays.push({ ds, d });
    if(logDays.length >= 30) break;
  }

  const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const logHtml = logDays.length === 0
    ? `<div class="history-empty">No sessions recorded yet.</div>`
    : logDays.map(({ds, d}) => {
        const mgs = muscles[ds] || [];
        const chips = mgs.map(m => `<span class="muscle-chip">${DATA[m]?DATA[m].label:m}</span>`).join('');

        // Count sets done that day
        let setsCount = 0;
        try {
          const dp = JSON.parse(localStorage.getItem('wd_'+ds)||'{}');
          Object.values(dp).forEach(e=>Object.values(e).forEach(v=>{if(v)setsCount++;}));
        } catch {}

        const isToday = ds === todayStr;
        const dateLabel = isToday ? 'Today' : WEEKDAYS[d.getDay()];
        const dateShort = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});

        return `<div class="day-log-row">
          <div class="day-log-date">${dateLabel}<span class="dldate-sub">${dateShort}</span></div>
          <div class="day-log-muscles">${chips || '<span style="font-size:0.55rem;color:var(--text-dim);letter-spacing:0.1em;">—</span>'}</div>
          ${setsCount > 0 ? `<div class="day-log-sets">${setsCount} sets</div>` : ''}
        </div>`;
      }).join('');

  // ── This week's volume per muscle group ────────────────
  const dowIdx = (today.getDay()+6)%7;
  const weekStart = new Date(today); weekStart.setDate(today.getDate() - dowIdx);
  const weekDays = [];
  for(let d=0; d<7; d++) {
    const dt = new Date(weekStart); dt.setDate(weekStart.getDate()+d);
    if(dt > today) break;
    weekDays.push(localDateStr(dt));
  }
  const muscleVol = {};
  Object.entries(DATA).forEach(([k,g]) => {
    let sets = 0;
    weekDays.forEach(ds => {
      try {
        const dp = JSON.parse(localStorage.getItem('wd_'+ds)||'{}');
        g.exercises.forEach(ex => {
          if(dp[ex.id]) sets += Object.values(dp[ex.id]).filter(Boolean).length;
        });
      } catch {}
    });
    muscleVol[k] = { label: g.label, sets, target: g.exercises.reduce((s,e)=>s+e.sets,0) };
  });
  const maxMuscleVol = Math.max(...Object.values(muscleVol).map(m=>m.sets), 1);
  const muscleVolBars = Object.values(muscleVol).map(m => {
    const barH = Math.max(m.sets / maxMuscleVol * 68, m.sets > 0 ? 4 : 1);
    const done = m.sets >= m.target;
    return `<div class="vol-bar-col">
        <div class="vol-bar-val">${m.sets > 0 ? m.sets : ''}</div>
        <div class="vol-bar ${m.sets>0?'has-data':''} ${done?'this-week':''}"
          style="height:${barH}px" title="${m.label}: ${m.sets}/${m.target} sets"></div>
        <div class="vol-bar-lbl">${m.label}</div>
      </div>`;
  }).join('');
  const weekLabel = weekStart.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const volChart = `<div class="vol-chart-wrap">
      <div class="vol-bar-area">${muscleVolBars}</div>
      <div style="font-size:0.44rem;color:var(--text-dim);letter-spacing:0.15em;text-transform:uppercase;margin-top:6px;">
        Week of ${weekLabel} &nbsp;·&nbsp; <span style="color:var(--green-text)">■</span> full target reached
      </div>
    </div>`;

  // ── Weekly volume sparklines (last 8 weeks, total reps per muscle) ───
  const SPARKWEEKS = 8;
  function getWeekStarts(n) {
    const t = new Date();
    const dow = (t.getDay() + 6) % 7; // Mon=0
    const thisMonday = new Date(t); thisMonday.setDate(t.getDate() - dow);
    const starts = [];
    for (let w = n - 1; w >= 0; w--) {
      const d = new Date(thisMonday); d.setDate(thisMonday.getDate() - w * 7);
      starts.push(d);
    }
    return starts;
  }
  const weekStarts = getWeekStarts(SPARKWEEKS);
  const sparkData = {};
  Object.entries(DATA).forEach(([key, g]) => {
    sparkData[key] = weekStarts.map(start => {
      let total = 0;
      for (let d = 0; d < 7; d++) {
        const dt = new Date(start); dt.setDate(start.getDate() + d);
        const ds = localDateStr(dt);
        try {
          const dp = JSON.parse(localStorage.getItem('wd_' + ds) || '{}');
          g.exercises.forEach(ex => {
            const ep = dp[ex.id] || {};
            Object.values(ep).forEach(v => { total += getRepsValue(v, ex.id); });
          });
        } catch {}
      }
      return total;
    });
  });

  const W = 220, H = 52, TPAD = 14, BPAD = 6, LPAD = 4, RPAD = 4;
  const xStep = (W - LPAD - RPAD) / (SPARKWEEKS - 1);

  const sparkRows = Object.entries(DATA).map(([key, g]) => {
    const vols = sparkData[key];
    const latest = vols[vols.length - 1];
    const localMax = Math.max(...vols, 1);

    function xt(i) { return LPAD + i * xStep; }
    function yt(v) { return TPAD + (1 - v / localMax) * (H - TPAD - BPAD); }

    const pts = vols.map((v, i) => `${xt(i).toFixed(1)},${yt(v).toFixed(1)}`).join(' ');

    const dots = vols.map((v, i) => {
      const x = xt(i).toFixed(1), y = yt(v).toFixed(1);
      const isLast = i === SPARKWEEKS - 1;
      if (isLast) {
        // highlighted dot + label always shown
        const labelY = (parseFloat(y) - 7).toFixed(1);
        return `
          <circle cx="${x}" cy="${y}" r="3.5" fill="var(--green-text)" stroke="none"/>
          ${latest > 0 ? `<text x="${x}" y="${labelY}" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="9" fill="var(--green-text)" letter-spacing="0.04em">${latest}</text>` : ''}`;
      } else if (v > 0) {
        const labelY = (parseFloat(y) - 6).toFixed(1);
        return `
          <circle cx="${x}" cy="${y}" r="2" fill="var(--accent)" stroke="none" opacity="0.7"/>
          <text x="${x}" y="${labelY}" text-anchor="middle" font-family="'DM Mono',monospace" font-size="7.5" fill="var(--text-dim)" letter-spacing="0">${v}</text>`;
      } else {
        return `<circle cx="${x}" cy="${y}" r="1.5" fill="var(--border2)" stroke="none" opacity="0.5"/>`;
      }
    }).join('');

    return `<div class="sparkline-row">
      <div class="sparkline-label">${g.label}</div>
      <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" height="${H}" preserveAspectRatio="none">
        <polyline points="${pts}" fill="none" stroke="var(--border2)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}
      </svg>
    </div>`;
  }).join('');

  // shared week-tick axis aligned to same X positions
  const tickSvg = `<svg class="sparkline-axis-svg" viewBox="0 0 ${W} 10" height="10" preserveAspectRatio="none">
    ${Array.from({length: SPARKWEEKS}, (_, i) => {
      const x = (LPAD + i * xStep).toFixed(1);
      const isLast = i === SPARKWEEKS - 1;
      return `<line x1="${x}" y1="0" x2="${x}" y2="${isLast ? 8 : 5}" stroke="${isLast ? 'var(--green-text)' : 'var(--border2)'}" stroke-width="1" opacity="${isLast ? '1' : '0.6'}"/>`;
    }).join('')}
  </svg>`;

  const sparklineHtml = `
    <div class="sparkline-list">${sparkRows}</div>
    <div class="sparkline-week-axis">
      <div class="sparkline-axis-gap"></div>
      ${tickSvg}
    </div>`;

  document.getElementById('history-content').innerHTML = `
    <div class="history-section-label">12-Week Overview</div>
    ${grid}
    <div class="history-section-label" style="margin-top:8px;">This Week's Volume</div>
    ${volChart}
    <div class="history-section-label" style="margin-top:8px;">Weekly Volume &mdash; Reps</div>
    ${sparklineHtml}
  `;
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playBeep(freq=880, dur=0.12, vol=0.25) {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playRestDone() {
  playBeep(523,0.10); setTimeout(()=>playBeep(659,0.10),130); setTimeout(()=>playBeep(784,0.22),260);
}
function playWarningBeep() { playBeep(440,0.07,0.15); }

function loadExHistory() { try { return JSON.parse(localStorage.getItem('wd_ex_hist')||'{}'); } catch { return {}; } }
function saveExHistory(h) { localStorage.setItem('wd_ex_hist', JSON.stringify(h)); }
function recordExSets(exId, count) {
  const h = loadExHistory();
  if (!h[exId]) h[exId] = {};
  h[exId][localDateStr(new Date())] = count;
  saveExHistory(h);
}
function getExStreak(exId, totalSets) {
  const exH = (loadExHistory()[exId]) || {};
  const today = new Date(), todayStr = localDateStr(today);
  const startI = (exH[todayStr]||0) >= totalSets ? 0 : 1;
  let streak = 0;
  for (let i = startI; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    if ((exH[localDateStr(d)]||0) >= totalSets) streak++;
    else break;
  }
  return streak;
}
function getTotalExSessions(exId, totalSets) {
  return Object.values((loadExHistory()[exId])||{}).filter(v=>v>=totalSets).length;
}

function loadCustomExercises() {
  try { return JSON.parse(localStorage.getItem('wd_custom_exercises') || '{}'); } catch { return {}; }
}
function saveCustomExercises(obj) {
  localStorage.setItem('wd_custom_exercises', JSON.stringify(obj));
}
function mergeCustomExercises() {
  const custom = loadCustomExercises();
  Object.entries(DATA).forEach(([muscleKey]) => {
    // Strip any previously merged custom exercises
    DATA[muscleKey].exercises = DATA[muscleKey].exercises.filter(e => !e.isCustom);
  });
  Object.entries(custom).forEach(([muscleKey, exercises]) => {
    if (!DATA[muscleKey]) return;
    exercises.forEach(ex => DATA[muscleKey].exercises.push({ ...ex, isCustom: true }));
  });
}

function saveNewExercise() {
  const name = document.getElementById('ae-name').value.trim();
  const setsVal = parseInt(document.getElementById('ae-sets').value, 10);
  if (!name) { showToast('Exercise name is required.'); return; }
  if (!setsVal || setsVal < 1) { showToast('Sets must be at least 1.'); return; }

  const muscles = document.getElementById('ae-muscles').value.trim() || '—';
  const reps    = document.getElementById('ae-reps').value.trim() || '8-12';
  const rest    = parseInt(document.getElementById('ae-rest').value, 10) || 90;
  const cues    = document.getElementById('ae-cues').value.trim() || '';
  const tempo   = ['ae-t0','ae-t1','ae-t2','ae-t3'].map(id => {
    const v = parseInt(document.getElementById(id).value, 10);
    return isNaN(v) ? '2' : String(v);
  });
  const tempoLabels = ['Eccentric','Bottom Hold','Concentric','Top Hold'];

  // Generate a unique id
  const baseId = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  const allIds = Object.values(DATA).flatMap(g => g.exercises.map(e => e.id));
  let id = baseId, n = 2;
  while (allIds.includes(id)) { id = baseId + '_' + n++; }

  const ex = { id, name, sets: setsVal, reps, tempo, tempoLabels, muscles, cues, rest };

  const custom = loadCustomExercises();
  if (!custom[_aeTargetMuscle]) custom[_aeTargetMuscle] = [];
  custom[_aeTargetMuscle].push(ex);
  saveCustomExercises(custom);

  mergeCustomExercises();
  closeAddExModal();
  renderMain(_aeTargetMuscle);
  showToast(`"${name}" added.`);
}

function deleteCustomExercise(muscleKey, exId) {
  if (!confirm('Remove this exercise permanently?')) return;
  const custom = loadCustomExercises();
  if (custom[muscleKey]) {
    custom[muscleKey] = custom[muscleKey].filter(e => e.id !== exId);
    if (custom[muscleKey].length === 0) delete custom[muscleKey];
  }
  saveCustomExercises(custom);
  mergeCustomExercises(); // exercise is now gone from DATA

  // Scrub this exercise from every stored daily-progress key (wd_YYYY-MM-DD),
  // then recalculate wd_hist and wd_muscles so the 12-week grid stays accurate.
  const hist    = loadHistory();
  const muscles = JSON.parse(localStorage.getItem('wd_muscles') || '{}');
  const dateRe  = /^wd_(\d{4}-\d{2}-\d{2})$/;

  Object.keys(localStorage).forEach(key => {
    const m = key.match(dateRe);
    if (!m) return;
    const dateStr = m[1];
    try {
      const dp = JSON.parse(localStorage.getItem(key) || '{}');
      if (!dp[exId]) return; // exercise wasn't logged this day

      delete dp[exId];

      const totalDone = Object.values(dp)
        .reduce((sum, ep) => sum + Object.values(ep).filter(Boolean).length, 0);

      if (totalDone === 0) {
        // No sets left for this day at all — remove the day entirely
        localStorage.removeItem(key);
        delete hist[dateStr];
        delete muscles[dateStr];
      } else {
        // Other sets remain — save cleaned data and rebuild muscle-group list
        localStorage.setItem(key, JSON.stringify(dp));
        const activeMuscles = new Set();
        Object.keys(dp).forEach(eid => {
          if (Object.values(dp[eid]).some(v => v)) {
            for (const [mk, g] of Object.entries(DATA)) {
              if (g.exercises.some(e => e.id === eid)) { activeMuscles.add(mk); break; }
            }
          }
        });
        muscles[dateStr] = [...activeMuscles];
      }
    } catch {}
  });

  localStorage.setItem('wd_hist',    JSON.stringify(hist));
  localStorage.setItem('wd_muscles', JSON.stringify(muscles));

  // Remove orphaned streak / session history for this exercise.
  const exHist = loadExHistory();
  if (exHist[exId]) { delete exHist[exId]; saveExHistory(exHist); }

  updateHeader();
  renderMain(muscleKey);
  showToast('Exercise removed.');
}

// ── History panel horizontal resize ──────────────────────
(function() {
  const handle = document.getElementById('historyResizeHandle');
  const panel  = document.getElementById('historyPanel');
  let dragging = false;
  let startX, startW;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'ew-resize';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startX - e.clientX;   // dragging left = wider
    const newW  = Math.min(
      Math.max(startW + delta, parseInt(getComputedStyle(panel).minWidth)),
      window.innerWidth * 0.9
    );
    panel.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
})();
</script>
</body>
